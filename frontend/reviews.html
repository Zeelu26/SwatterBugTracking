<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Swatter – Reviews</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/swatter.css">
  <style>body{background:#0f0f1e;} .star-btn{cursor:pointer;font-size:24px;color:#2a2a4a;transition:color 0.15s;} .star-btn.active{color:#FFBE32;} .star-btn:hover{color:#FFBE32;}</style>
</head>
<body class="h-full overflow-auto">
<div class="h-full flex flex-col">
  <header class="sticky top-0 z-20 px-6 py-4 flex items-center justify-between" style="background:rgba(15,15,30,0.85);backdrop-filter:blur(12px);border-bottom:1px solid #1e1e3a;">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-lg flex items-center justify-center" style="background:#FFBE32;"><svg viewBox="0 0 24 24" width="20" height="20" style="color:#0f0f1e;"><rect x="10" y="14" width="4" height="8" fill="currentColor"/><circle cx="12" cy="8" r="6" fill="none" stroke="currentColor" stroke-width="2"/></svg></div>
      <span class="text-lg font-bold" style="color:#FFBE32;">Swatter</span>
    </div>
    <div class="flex items-center gap-3">
      <a href="/" class="text-xs font-medium px-3 py-2 rounded-xl" style="color:#FFBE32;background:#1a1a35;border:1px solid #2a2a4a;">← Back</a>
      <span id="user-info" class="text-sm hidden sm:inline" style="color:#c0c0d8;"></span>
    </div>
  </header>
  <main class="flex-1 overflow-auto p-6">
    <div class="max-w-2xl mx-auto">
      <div class="anim-fade-up mb-8">
        <h2 class="text-2xl font-bold mb-2" style="color:#e8e8f0;">Reviews</h2>
        <p style="color:#8888aa;">See what people are saying about Swatter</p>
      </div>

      <!-- WRITE REVIEW FORM (only if logged in) -->
      <div id="review-form" class="hidden rounded-2xl p-5 mb-8 anim-fade-up delay-1" style="background:#1a1a35;border:1px solid #2a2a4a;">
        <h3 class="text-sm font-semibold mb-4" style="color:#e8e8f0;">Write a Review</h3>
        <div class="mb-4">
          <label class="block text-xs font-medium mb-2" style="color:#c0c0d8;">Rating</label>
          <div class="flex gap-1" id="star-selector">
            <span class="star-btn" onclick="setRating(1)">★</span>
            <span class="star-btn" onclick="setRating(2)">★</span>
            <span class="star-btn" onclick="setRating(3)">★</span>
            <span class="star-btn" onclick="setRating(4)">★</span>
            <span class="star-btn" onclick="setRating(5)">★</span>
          </div>
        </div>
        <label class="block text-xs font-medium mb-2" style="color:#c0c0d8;">Title</label>
        <input id="rev-title" type="text" placeholder="Sum it up in a few words" class="w-full px-4 py-2.5 rounded-xl text-sm mb-4" style="background:#0f0f1e;border:1px solid #2a2a4a;color:#e8e8f0;">
        <label class="block text-xs font-medium mb-2" style="color:#c0c0d8;">Details (optional)</label>
        <textarea id="rev-body" rows="3" placeholder="Tell us more..." class="w-full px-4 py-2.5 rounded-xl text-sm mb-4 resize-none" style="background:#0f0f1e;border:1px solid #2a2a4a;color:#e8e8f0;"></textarea>
        <button onclick="submitReview()" class="px-6 py-2.5 rounded-xl text-sm font-semibold hover:brightness-110" style="background:#FFBE32;color:#0f0f1e;">Submit Review</button>
      </div>

      <div id="login-prompt" class="hidden rounded-2xl p-5 mb-8 text-center" style="background:#1a1a35;border:1px solid #2a2a4a;">
        <p class="text-sm mb-3" style="color:#8888aa;">Want to leave a review?</p>
        <a href="/login" class="px-6 py-2.5 rounded-xl text-sm font-semibold inline-block" style="background:#FFBE32;color:#0f0f1e;">Sign in</a>
      </div>

      <!-- REVIEWS LIST -->
      <div id="reviews-list" class="space-y-4"></div>
    </div>
  </main>
</div>

<div id="toast" class="fixed bottom-6 right-6 z-50 hidden px-5 py-3 rounded-xl text-sm font-medium shadow-2xl anim-fade-up" style="color:white;"></div>

<script src="/js/swatter.js"></script>
<script>
  let me=null, selectedRating=0;

  async function init(){
    const{ok,data}=await apiFetch('/me');
    if(ok&&data.id){
      me=data;
      document.getElementById('user-info').textContent=data.name;
      document.getElementById('review-form').classList.remove('hidden');
    } else {
      document.getElementById('login-prompt').classList.remove('hidden');
    }
    await loadReviews();
    lucide.createIcons();
  }

  function setRating(n){
    selectedRating=n;
    document.querySelectorAll('#star-selector .star-btn').forEach((s,i)=>{s.classList.toggle('active',i<n);});
  }

  async function submitReview(){
    const title=document.getElementById('rev-title').value.trim();
    const body=document.getElementById('rev-body').value.trim();
    if(!selectedRating){showToast('Please select a rating','#ef4444');return;}
    if(!title){showToast('Title is required','#ef4444');return;}
    const{ok,data}=await apiFetch('/reviews','POST',{rating:selectedRating,title,body});
    if(!ok){showToast(data?.error||'Failed','#ef4444');return;}
    showToast('Review submitted!');
    document.getElementById('rev-title').value='';document.getElementById('rev-body').value='';
    setRating(0);
    await loadReviews();
  }

  async function loadReviews(){
    const{ok,data}=await apiFetch('/reviews');
    if(!ok)return;
    const el=document.getElementById('reviews-list');
    if(!data.length){el.innerHTML='<div class="text-center py-12 text-sm" style="color:#8888aa;">No reviews yet. Be the first!</div>';return;}
    const isStaff=me&&['admin','developer'].includes(me.role);
    el.innerHTML=data.map(r=>{
      const starStr='<span style="color:#FFBE32;">'+stars(r.rating)+'</span>';
      let repliesHtml=(r.replies||[]).map(rp=>`<div class="ml-6 mt-3 p-3 rounded-xl" style="background:#0f0f1e;border:1px solid #2a2a4a;">
        <div class="flex items-center gap-2 mb-1"><span class="text-xs font-semibold" style="color:#FFBE32;">${esc(rp.author_name)}</span><span class="text-xs px-2 py-0.5 rounded-full capitalize" style="background:rgba(59,130,246,0.12);color:#3b82f6;">${rp.author_role}</span></div>
        <p class="text-sm" style="color:#c0c0d8;">${esc(rp.text)}</p></div>`).join('');
      let replyForm=isStaff?`<div class="ml-6 mt-3 flex gap-2"><input type="text" id="reply-${r.id}" placeholder="Reply as staff..." class="flex-1 px-3 py-2 rounded-lg text-xs" style="background:#0f0f1e;border:1px solid #2a2a4a;color:#e8e8f0;"><button onclick="replyReview(${r.id})" class="px-3 py-2 rounded-lg text-xs font-medium" style="background:#FFBE32;color:#0f0f1e;">Reply</button></div>`:'';
      let deleteBtn=isStaff?`<button onclick="deleteReview(${r.id})" class="text-xs px-2 py-1 rounded-lg" style="color:#ef4444;background:rgba(239,68,68,0.12);">Delete</button>`:'';
      return`<div class="rounded-2xl p-5 anim-fade-up" style="background:#1a1a35;border:1px solid #2a2a4a;">
        <div class="flex items-center justify-between mb-3">
          <div class="flex items-center gap-3"><span class="text-sm font-semibold" style="color:#e8e8f0;">${esc(r.author_name)}</span><span class="text-xs" style="color:#666688;">${timeAgo(r.created_at)}</span></div>
          <div class="flex items-center gap-2">${starStr} ${deleteBtn}</div>
        </div>
        <h4 class="text-sm font-bold mb-2" style="color:#e8e8f0;">${esc(r.title)}</h4>
        ${r.body?`<p class="text-sm mb-2" style="color:#c0c0d8;line-height:1.5;">${esc(r.body)}</p>`:''}
        ${repliesHtml}${replyForm}</div>`;
    }).join('');
  }

  async function replyReview(rid){
    const input=document.getElementById('reply-'+rid);
    const text=input.value.trim();
    if(!text){showToast('Enter a reply','#ef4444');return;}
    const{ok,data}=await apiFetch(`/reviews/${rid}/reply`,'POST',{text});
    if(!ok){showToast(data?.error||'Failed','#ef4444');return;}
    showToast('Reply posted');
    await loadReviews();
  }

  async function deleteReview(rid){
    if(!confirm('Delete this review?'))return;
    const{ok}=await apiFetch(`/reviews/${rid}`,'DELETE');
    if(!ok)return;
    showToast('Review deleted');
    await loadReviews();
  }

  init();
</script>
</body>
</html>
